{% extends 'core/base.html' %}

{% block content %}

<h1>Criar Treino</h1>

<form method="POST">
    {% csrf_token %}

    <input type="text" name="nome" placeholder="Nome do treino">

    <select name="aluno">
        {% for aluno in alunos %}
            <option value="{{ aluno.id }}">{{ aluno.nome }}</option>
        {% endfor %}
    </select>

    <button type="submit">Criar</button>
</form>

{% endblock %}
