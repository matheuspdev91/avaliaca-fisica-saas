<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Exercicio - FitFlix</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f0f0f;
            color: #fff;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .header {
            background: #1a1a1a;
            padding: 20px;
            border-bottom: 2px solid #e50914;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header a {
            color: #fff;
            text-decoration: none;
            font-size: 14px;
        }

        .header a:hover {
            color: #e50914;
        }

        .header h1 {
            margin: 0;
            color: #e50914;
            font-size: 24px;
        }

        .container {
            max-width: 500px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .form-card {
            background: #1c1c1c;
            border-radius: 10px;
            padding: 30px;
        }

        .form-card h2 {
            margin: 0 0 25px 0;
            text-align: center;
            color: #fff;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #333;
            border-radius: 5px;
            background: #0f0f0f;
            color: #fff;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #e50914;
        }

        .form-group input[type="file"] {
            padding: 10px;
            cursor: pointer;
        }

        .form-group input[type="file"]::-webkit-file-upload-button {
            background: #333;
            color: #fff;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 10px;
        }

        .form-group input[type="file"]::-webkit-file-upload-button:hover {
            background: #e50914;
        }

        .preview-container {
            margin-top: 10px;
            padding: 10px;
            background: #0f0f0f;
            border-radius: 5px;
            text-align: center;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .preview-container img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 5px;
        }

        .preview-container .placeholder {
            color: #555;
            font-size: 12px;
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: #e50914;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: #b20710;
        }

        .messages {
            margin-bottom: 20px;
        }

        .message {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .message.success {
            background: #1e4620;
            color: #4caf50;
            border: 1px solid #4caf50;
        }

        .message.error {
            background: #461e1e;
            color: #f44336;
            border: 1px solid #f44336;
        }
    </style>
</head>

<body>

<div class="header">
    <a href="{% url 'core:fitflix' %}">← Voltar</a>
    <h1>FitFlix</h1>
</div>

<div class="container">
    <div class="form-card">
        <h2>Criar Novo Exercicio</h2>

        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="message {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="form-group">
                <label for="nome">Nome do Exercicio</label>
                <input type="text" id="nome" name="nome" placeholder="Ex: Supino Reto" required>
            </div>

            <div class="form-group">
                <label for="grupo_muscular">Grupo Muscular</label>
                <select id="grupo_muscular" name="grupo_muscular" required>
                    <option value="">Selecione...</option>
                    <option value="peito">Peito</option>
                    <option value="costas">Costas</option>
                    <option value="pernas">Pernas</option>
                    <option value="ombros">Ombros</option>
                    <option value="biceps">Biceps</option>
                    <option value="triceps">Triceps</option>
                    <option value="abdomen">Abdomen</option>
                </select>
            </div>

            <div class="form-group">
                <label for="imagem">Imagem de Capa (Thumbnail)</label>
                <input type="file" id="imagem" name="imagem" accept="image/*" onchange="previewImage(this, 'preview-imagem')">
                <div class="preview-container" id="preview-imagem">
                    <span class="placeholder">Previa da imagem aparecera aqui</span>
                </div>
            </div>

            <div class="form-group">
                <label for="gif">GIF Animado (Opcional)</label>
                <input type="file" id="gif" name="gif" accept="image/gif,image/*" onchange="previewImage(this, 'preview-gif')">
                <div class="preview-container" id="preview-gif">
                    <span class="placeholder">Previa do GIF aparecera aqui</span>
                </div>
            </div>

            <button type="submit" class="btn-submit">Salvar Exercicio</button>
        </form>
    </div>
</div>

<script>
    function previewImage(input, previewId) {
        const preview = document.getElementById(previewId);

        if (input.files && input.files[0]) {
            const reader = new FileReader();

            reader.onload = function(e) {
                preview.innerHTML = '<img src="' + e.target.result + '" alt="Preview">';
            }

            reader.readAsDataURL(input.files[0]);
        } else {
            preview.innerHTML = '<span class="placeholder">Previa aparecera aqui</span>';
        }
    }
</script>

</body>
</html>
